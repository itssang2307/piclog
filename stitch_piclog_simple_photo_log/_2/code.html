<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Be+Vietnam+Pro', sans-serif;
        }
        h1, h2, h3, .headline-font {
            font-family: 'Plus+Jakarta+Sans', sans-serif;
        }
        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "inverse-on-surface": "#9a9d9e",
                      "on-background": "#2c3436",
                      "on-secondary-fixed": "#2b4441",
                      "on-primary-fixed-variant": "#006760",
                      "primary-fixed-dim": "#6ae8dc",
                      "on-surface": "#2c3436",
                      "surface-container-lowest": "#ffffff",
                      "secondary-fixed": "#cce8e4",
                      "tertiary-fixed": "#b7e7ff",
                      "error-dim": "#67040d",
                      "primary-container": "#79f7ea",
                      "outline": "#747c7e",
                      "on-tertiary": "#f3faff",
                      "surface-container-highest": "#dce4e6",
                      "on-primary-fixed": "#004843",
                      "on-secondary": "#e2fffa",
                      "on-tertiary-fixed-variant": "#2f5f74",
                      "on-tertiary-container": "#24566a",
                      "surface-container-low": "#f0f4f6",
                      "error-container": "#fa746f",
                      "surface-variant": "#dce4e6",
                      "tertiary-dim": "#28596d",
                      "inverse-primary": "#7cfaed",
                      "surface-dim": "#d4dbde",
                      "surface": "#f8fafb",
                      "on-surface-variant": "#596063",
                      "tertiary-container": "#b7e7ff",
                      "primary-fixed": "#79f7ea",
                      "inverse-surface": "#0b0f10",
                      "on-error-container": "#6e0a12",
                      "tertiary": "#356579",
                      "on-secondary-fixed-variant": "#47605d",
                      "outline-variant": "#acb3b6",
                      "surface-container": "#eaeff0",
                      "primary": "#006b64",
                      "surface-tint": "#006b64",
                      "surface-bright": "#f8fafb",
                      "secondary-container": "#cce8e4",
                      "secondary": "#4a6460",
                      "tertiary-fixed-dim": "#a9d8f0",
                      "on-secondary-container": "#3d5653",
                      "secondary-dim": "#3f5855",
                      "surface-container-high": "#e3e9eb",
                      "primary-dim": "#005e57",
                      "on-error": "#fff7f6",
                      "on-primary": "#e2fffa",
                      "on-primary-container": "#005c56",
                      "on-tertiary-fixed": "#0a4356",
                      "secondary-fixed-dim": "#bedad6",
                      "error": "#a83836",
                      "background": "#f8fafb"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {},
              "fontFamily": {
                      "headline": ["Plus Jakarta Sans"],
                      "body": ["Be Vietnam Pro"],
                      "label": ["Be Vietnam Pro"]
              }
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl docked full-width top-0 sticky z-50 shadow-sm dark:shadow-none w-full">
<div class="flex items-center justify-between px-6 py-4 w-full max-w-3xl mx-auto">
<button class="text-slate-400 dark:text-slate-600 hover:bg-teal-50 dark:hover:bg-teal-900/30 transition-colors duration-200 p-2 rounded-full active:scale-95 transition-transform">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-2xl font-black text-teal-600 dark:text-teal-400">PicLog</h1>
<div class="w-10"></div> <!-- Spacer to center title -->
</div>
</header>
<!-- Content Canvas -->
<main class="flex-1 w-full max-w-3xl px-6 py-10 md:py-16">
<div class="space-y-12">
<!-- Header Section -->
<section class="space-y-2">
<p class="font-label text-primary font-semibold tracking-wider text-[10px] uppercase">New Entry</p>
<h2 class="font-headline text-4xl md:text-5xl font-extrabold tracking-tighter text-on-surface">새로운 기록 남기기</h2>
</section>
<!-- Title Input -->
<div class="relative group">
<input class="w-full bg-transparent border-none p-0 text-3xl md:text-4xl font-headline font-bold placeholder:text-surface-container-highest focus:ring-0 focus:outline-none transition-all duration-300" placeholder="제목을 입력하세요" type="text"/>
<div class="absolute bottom-[-8px] left-0 w-full h-[2px] bg-surface-container-high group-focus-within:bg-primary/30 transition-all duration-500"></div>
</div>
<!-- Body Text Area -->
<div class="min-h-[300px]">
<textarea class="w-full min-h-[300px] bg-transparent border-none p-0 text-xl font-body leading-relaxed placeholder:text-surface-container-highest focus:ring-0 focus:outline-none resize-none" placeholder="오늘의 기록을 남겨보세요..."></textarea>
</div>
<!-- Image Upload Section -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h3 class="font-headline font-bold text-lg text-on-surface">이미지 첨부 (선택사항)</h3>
<span class="font-label text-xs text-on-surface-variant bg-surface-container px-2 py-1 rounded-sm">0 / 1</span>
</div>
<div class="relative aspect-[16/9] w-full bg-surface-container-low rounded-xl border-2 border-dashed border-outline-variant/30 flex flex-col items-center justify-center group hover:bg-surface-container transition-all duration-300 cursor-pointer overflow-hidden">
<div class="flex flex-col items-center space-y-3 group-hover:scale-105 transition-transform duration-300">
<div class="w-14 h-14 rounded-full bg-primary-container/30 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl">add</span>
</div>
<p class="font-label text-sm font-medium text-on-surface-variant">사진을 드래그하거나 클릭하여 업로드</p>
</div>
<!-- Placeholder decoration to mimic high-end UI -->
<div class="absolute bottom-4 right-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-6xl">image</span>
</div>
</div>
</section>
</div>
</main>
<!-- Bottom Action Bar (Transactional Focus: No Nav Shell) -->
<footer class="w-full max-w-3xl px-6 py-10 flex flex-col md:flex-row gap-4">
<button class="flex-1 bg-gradient-to-br from-primary to-primary-container text-on-primary py-5 rounded-full font-headline font-bold text-lg shadow-sm hover:shadow-xl hover:translate-y-[-2px] active:scale-95 transition-all duration-300">
            등록하기
        </button>
<button class="flex-none md:w-40 bg-surface-container-highest text-on-surface py-5 rounded-full font-headline font-bold text-lg hover:bg-surface-dim active:scale-95 transition-all duration-200">
            취소
        </button>
</footer>
<!-- Decorative Atrium Elements -->
<div class="fixed top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[120px] -z-10"></div>
<div class="fixed bottom-[-10%] left-[-5%] w-[300px] h-[300px] bg-tertiary-container/10 rounded-full blur-[100px] -z-10"></div>
</body></html>
