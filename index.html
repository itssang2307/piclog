<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PicLog — 픽로그</title>
  <meta name="description" content="글과 이미지를 가볍게 기록하는 공간" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "background": "#f8fafb",
            "surface": "#f8fafb",
            "surface-bright": "#f8fafb",
            "surface-dim": "#d4dbde",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f0f4f6",
            "surface-container": "#eaeff0",
            "surface-container-high": "#e3e9eb",
            "surface-container-highest": "#dce4e6",
            "surface-variant": "#dce4e6",
            "on-surface": "#2c3436",
            "on-surface-variant": "#596063",
            "on-background": "#2c3436",
            "primary": "#006b64",
            "primary-container": "#79f7ea",
            "on-primary": "#e2fffa",
            "on-primary-container": "#005c56",
            "secondary": "#4a6460",
            "secondary-container": "#cce8e4",
            "on-secondary-container": "#3d5653",
            "tertiary": "#356579",
            "tertiary-container": "#b7e7ff",
            "on-tertiary-container": "#24566a",
            "outline": "#747c7e",
            "outline-variant": "#acb3b6",
            "error": "#a83836",
          },
          fontFamily: {
            headline: ["Plus Jakarta Sans", "sans-serif"],
            body: ["Be Vietnam Pro", "sans-serif"],
            label: ["Be Vietnam Pro", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            "2xl": "1rem",
            full: "9999px",
          },
        },
      },
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html { overflow-x: hidden; }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background-color: #f8fafb;
      color: #2c3436;
      min-height: 100dvh;
      overflow-x: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    h1, h2, h3, h4, .font-headline {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      vertical-align: middle;
    }

    /* Screen visibility */
    .screen { display: none; }
    .screen.active { display: block; }

    /* Smooth page transitions */
    @media (prefers-reduced-motion: no-preference) {
      .screen { transition: opacity 0.2s ease; }
      .screen.active { opacity: 1; }
    }

    /* Editorial grid */
    .editorial-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    /* Card hover */
    .post-card {
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }
    .post-card:hover {
      box-shadow: 0 8px 32px rgba(44,52,54,0.08);
      transform: translateY(-2px);
    }
    @media (prefers-reduced-motion: reduce) {
      .post-card { transition: none; }
      .post-card:hover { transform: none; }
    }

    /* Image zoom on hover */
    .img-zoom {
      overflow: hidden;
    }
    .img-zoom img {
      transition: transform 0.5s ease;
    }
    @media (prefers-reduced-motion: no-preference) {
      .img-zoom:hover img { transform: scale(1.05); }
    }

    /* Focus visible ring */
    :focus-visible {
      outline: 2px solid #006b64;
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* Gradient button */
    .btn-primary {
      background: linear-gradient(135deg, #006b64, #79f7ea);
      color: #e2fffa;
      transition: opacity 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
    }
    .btn-primary:hover { opacity: 0.9; box-shadow: 0 8px 24px rgba(0,107,100,0.25); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    @media (prefers-reduced-motion: reduce) {
      .btn-primary { transition: opacity 0.2s ease; }
      .btn-primary:active { transform: none; }
    }

    .btn-secondary {
      background: #dce4e6;
      color: #2c3436;
      transition: background 0.2s ease, transform 0.15s ease;
    }
    .btn-secondary:hover { background: #d4dbde; }
    .btn-secondary:active { transform: scale(0.97); }
    @media (prefers-reduced-motion: reduce) {
      .btn-secondary:active { transform: none; }
    }

    /* Textarea auto-resize */
    textarea { resize: none; }

    /* Image preview */
    #img-preview {
      transition: opacity 0.3s ease;
    }

    /* Upload zone */
    .upload-zone {
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .upload-zone.drag-over {
      background: #f0f4f6;
      border-color: #006b64;
    }

    /* Detail image */
    .detail-image {
      width: 100%;
      max-height: 520px;
      object-fit: cover;
      border-radius: 0.75rem;
    }

    /* Toast */
    #toast.hidden-toast {
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
    }
    @media (prefers-reduced-motion: no-preference) {
      #toast {
        transition: opacity 0.3s ease, transform 0.3s ease;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      #toast { transition: opacity 0.2s ease; }
      #toast.hidden-toast { transform: none; }
    }

    /* Overscroll in modal */
    .modal-inner { overscroll-behavior: contain; }

    /* Skip link */
    .skip-link {
      position: absolute;
      left: -9999px;
      top: 1rem;
      z-index: 9999;
      padding: 0.5rem 1rem;
      background: #006b64;
      color: #e2fffa;
      border-radius: 0.25rem;
      font-weight: 600;
    }
    .skip-link:focus { left: 1rem; }

    /* Safe area */
    .safe-bottom { padding-bottom: max(1.5rem, env(safe-area-inset-bottom)); }
    .safe-header { padding-top: env(safe-area-inset-top); }

    /* Ambient blobs (decoration) */
    .blob {
      position: fixed;
      border-radius: 9999px;
      filter: blur(100px);
      z-index: -1;
      pointer-events: none;
    }

    /* Line clamp utilities */
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    /* Number tabular */
    .tabular-nums { font-variant-numeric: tabular-nums; }

    /* Heading text balance */
    h1, h2, h3 { text-wrap: balance; }

    /* Confirm dialog */
    #confirm-dialog.hidden { opacity: 0; pointer-events: none; }
    @media (prefers-reduced-motion: no-preference) {
      #confirm-dialog { transition: opacity 0.2s ease; }
    }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #e2fffa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @media (prefers-reduced-motion: reduce) {
      .spinner { animation: none; border-top-color: #e2fffa; }
    }
  </style>
</head>
<body class="bg-background text-on-background">

  <!-- Skip Navigation -->
  <a href="#main-content" class="skip-link">본문으로 바로가기</a>

  <!-- Ambient decorative blobs -->
  <div class="blob" style="width:400px;height:400px;top:-80px;right:-80px;background:rgba(0,107,100,0.06);" aria-hidden="true"></div>
  <div class="blob" style="width:320px;height:320px;bottom:-80px;left:-80px;background:rgba(183,231,255,0.12);" aria-hidden="true"></div>

  <!-- ══════════════════════════════════════
       TOAST
  ══════════════════════════════════════ -->
  <div
    id="toast"
    role="status"
    aria-live="polite"
    aria-atomic="true"
    class="hidden-toast fixed top-20 left-1/2 -translate-x-1/2 z-[9999] bg-on-surface text-surface-container-lowest text-sm font-medium px-5 py-3 rounded-full shadow-lg"
  ></div>

  <!-- ══════════════════════════════════════
       CONFIRM DIALOG
  ══════════════════════════════════════ -->
  <div
    id="confirm-dialog"
    class="hidden fixed inset-0 z-[9998] flex items-center justify-center p-4"
    role="dialog"
    aria-modal="true"
    aria-labelledby="confirm-title"
  >
    <div class="absolute inset-0 bg-on-surface/30 backdrop-blur-sm" id="confirm-backdrop"></div>
    <div class="relative bg-surface-container-lowest rounded-2xl shadow-xl p-6 w-full max-w-sm modal-inner">
      <h2 id="confirm-title" class="text-lg font-bold mb-2">작성 취소</h2>
      <p class="text-on-surface-variant text-sm mb-6">작성 중인 내용이 사라집니다. 정말 취소하시겠어요?</p>
      <div class="flex gap-3">
        <button id="confirm-cancel-btn" class="flex-1 btn-secondary py-3 rounded-full font-semibold text-sm focus-visible:ring-2 focus-visible:ring-primary">
          계속 작성
        </button>
        <button id="confirm-ok-btn" class="flex-1 btn-primary py-3 rounded-full font-semibold text-sm">
          취소하기
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       SHARED HEADER
  ══════════════════════════════════════ -->
  <header
    id="app-header"
    class="safe-header bg-white/80 backdrop-blur-xl sticky top-0 z-50 shadow-sm"
    style="padding-top: env(safe-area-inset-top);"
  >
    <div class="flex items-center justify-between px-5 py-4 w-full max-w-5xl mx-auto">

      <!-- Back button (detail/write screens) -->
      <button
        id="header-back-btn"
        class="hidden items-center gap-1.5 text-primary hover:bg-primary/10 transition-colors duration-200 px-3 py-2 rounded-xl font-semibold text-sm focus-visible:ring-2 focus-visible:ring-primary"
        aria-label="목록으로 돌아가기"
        onclick="navigateBack()"
        onkeydown="if(event.key==='Enter'||event.key===' ')navigateBack()"
      >
        <span class="material-symbols-outlined text-lg" aria-hidden="true">arrow_back_ios</span>
        <span>목록</span>
      </button>

      <!-- Logo -->
      <a
        href="#"
        id="header-logo"
        class="font-headline text-2xl font-black text-primary tracking-tight focus-visible:ring-2 focus-visible:ring-primary rounded-lg px-1"
        onclick="event.preventDefault(); showScreen('list')"
        aria-label="픽로그 홈으로"
        translate="no"
      >PicLog</a>

      <!-- Write button (list screen) -->
      <button
        id="header-write-btn"
        class="btn-primary flex items-center gap-1.5 px-4 py-2 rounded-full font-semibold text-sm focus-visible:ring-2 focus-visible:ring-primary"
        onclick="showScreen('write')"
        onkeydown="if(event.key==='Enter'||event.key===' ')showScreen('write')"
      >
        <span class="material-symbols-outlined text-base" aria-hidden="true">edit</span>
        글 작성하기
      </button>

      <!-- Spacer (detail/write screens) -->
      <div id="header-spacer" class="hidden w-20"></div>

    </div>
  </header>

  <!-- ══════════════════════════════════════
       SCREEN 1 — LIST / FEED
  ══════════════════════════════════════ -->
  <main id="screen-list" class="screen active">
    <div id="main-content" class="max-w-5xl mx-auto px-5 pt-10 pb-24">

      <!-- Hero -->
      <section class="mb-12" aria-label="서비스 소개">
        <p class="text-xs font-bold text-primary/70 uppercase tracking-widest mb-3 font-label">Simple Photo Log</p>
        <h1 class="font-headline text-4xl md:text-5xl font-extrabold tracking-tight text-on-background mb-3">
          픽로그<span translate="no"> · PicLog</span>
        </h1>
        <p class="text-on-surface-variant text-lg font-light max-w-lg leading-relaxed">
          글과 이미지를 가볍게 기록하는 공간
        </p>
      </section>

      <!-- Feed -->
      <section aria-label="게시글 목록">
        <div id="post-list" class="editorial-grid"></div>
        <!-- Empty state -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-24 text-center">
          <div class="w-20 h-20 rounded-full bg-surface-container flex items-center justify-center mb-5">
            <span class="material-symbols-outlined text-4xl text-on-surface-variant/40" aria-hidden="true">edit_note</span>
          </div>
          <p class="font-headline font-bold text-xl text-on-surface mb-2">아직 기록이 없어요</p>
          <p class="text-on-surface-variant text-sm mb-8">첫 번째 픽로그를 남겨보세요!</p>
          <button
            class="btn-primary px-8 py-3.5 rounded-full font-bold text-sm focus-visible:ring-2 focus-visible:ring-primary"
            onclick="showScreen('write')"
          >
            첫 글 작성하기
          </button>
        </div>
      </section>

    </div>
  </main>

  <!-- ══════════════════════════════════════
       SCREEN 2 — WRITE
  ══════════════════════════════════════ -->
  <main id="screen-write" class="screen" aria-label="글 작성">
    <div class="max-w-3xl mx-auto px-5 pt-10 pb-32">

      <div class="mb-10">
        <p class="text-xs font-bold text-primary/70 uppercase tracking-widest mb-2 font-label">New Entry</p>
        <h1 class="font-headline text-3xl md:text-4xl font-extrabold tracking-tight">새로운 기록 남기기</h1>
      </div>

      <form id="write-form" onsubmit="submitPost(event)" novalidate>

        <!-- Title -->
        <div class="mb-8">
          <label for="input-title" class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-3 font-label">
            제목 <span class="text-error" aria-label="필수">*</span>
          </label>
          <div class="relative group">
            <input
              id="input-title"
              name="title"
              type="text"
              required
              autocomplete="off"
              spellcheck="false"
              placeholder="제목을 입력하세요…"
              maxlength="100"
              class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 text-xl font-headline font-bold placeholder:text-on-surface-variant/40 focus-visible:ring-2 focus-visible:ring-primary/60 focus:outline-none transition-shadow duration-200"
              aria-required="true"
              aria-describedby="title-error"
            />
            <p id="title-error" class="hidden text-error text-xs mt-2 font-medium" role="alert">제목을 입력해주세요.</p>
          </div>
        </div>

        <!-- Body -->
        <div class="mb-8">
          <label for="input-body" class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-3 font-label">
            본문 <span class="text-error" aria-label="필수">*</span>
          </label>
          <textarea
            id="input-body"
            name="body"
            required
            autocomplete="off"
            spellcheck="true"
            placeholder="오늘의 기록을 남겨보세요…"
            rows="8"
            class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 text-base leading-relaxed placeholder:text-on-surface-variant/40 focus-visible:ring-2 focus-visible:ring-primary/60 focus:outline-none transition-shadow duration-200"
            aria-required="true"
            aria-describedby="body-error"
            oninput="autoResize(this)"
          ></textarea>
          <p id="body-error" class="hidden text-error text-xs mt-2 font-medium" role="alert">본문을 입력해주세요.</p>
        </div>

        <!-- Image upload -->
        <div class="mb-10">
          <div class="flex items-center justify-between mb-3">
            <label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest font-label" for="input-image">
              이미지 첨부 <span class="text-on-surface-variant/50 font-normal normal-case tracking-normal">(선택사항)</span>
            </label>
            <button
              type="button"
              id="remove-img-btn"
              class="hidden text-xs text-error hover:text-error/80 transition-colors font-medium focus-visible:ring-2 focus-visible:ring-error rounded px-2 py-1"
              onclick="removeImage()"
              aria-label="첨부 이미지 제거"
            >이미지 제거</button>
          </div>

          <!-- Upload zone -->
          <div
            id="upload-zone"
            class="upload-zone relative aspect-[16/9] w-full bg-surface-container-low rounded-xl border-2 border-dashed border-outline-variant/40 flex flex-col items-center justify-center cursor-pointer overflow-hidden"
            role="button"
            tabindex="0"
            aria-label="이미지 파일을 선택하거나 드래그하여 업로드"
            onclick="document.getElementById('input-image').click()"
            onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();document.getElementById('input-image').click();}"
            ondragover="handleDragOver(event)"
            ondragleave="handleDragLeave(event)"
            ondrop="handleDrop(event)"
          >
            <!-- Placeholder content -->
            <div id="upload-placeholder" class="flex flex-col items-center gap-3 px-6 text-center">
              <div class="w-14 h-14 rounded-full bg-primary-container/30 flex items-center justify-center">
                <span class="material-symbols-outlined text-3xl text-primary" aria-hidden="true">add_photo_alternate</span>
              </div>
              <p class="text-sm font-medium text-on-surface-variant">
                사진을 드래그하거나 <span class="text-primary font-semibold">클릭하여 업로드</span>
              </p>
              <p class="text-xs text-on-surface-variant/60">JPG, PNG, WEBP · 최대 10MB</p>
            </div>

            <!-- Preview -->
            <div id="img-preview-wrapper" class="hidden absolute inset-0">
              <img
                id="img-preview"
                src=""
                alt="첨부 이미지 미리보기"
                class="w-full h-full object-cover"
                width="640"
                height="360"
              />
              <div class="absolute inset-0 bg-gradient-to-t from-on-surface/30 to-transparent"></div>
              <p class="absolute bottom-3 left-4 text-xs text-white font-medium opacity-80">이미지가 첨부됩니다</p>
            </div>

            <!-- Decorative icon -->
            <span class="absolute bottom-4 right-4 material-symbols-outlined text-6xl text-on-surface-variant/8 pointer-events-none select-none" aria-hidden="true">image</span>
          </div>

          <input
            id="input-image"
            name="image"
            type="file"
            accept="image/jpeg,image/png,image/webp,image/gif"
            class="sr-only"
            aria-label="이미지 파일 선택"
            onchange="handleFileSelect(event)"
          />
        </div>

        <!-- Actions -->
        <div class="flex flex-col-reverse md:flex-row gap-3">
          <button
            type="button"
            class="btn-secondary flex-none md:w-36 py-4 rounded-full font-bold text-base focus-visible:ring-2 focus-visible:ring-primary"
            onclick="confirmCancel()"
            onkeydown="if(event.key==='Enter'||event.key===' ')confirmCancel()"
          >
            취소하기
          </button>
          <button
            id="submit-btn"
            type="submit"
            class="btn-primary flex-1 py-4 rounded-full font-bold text-base focus-visible:ring-2 focus-visible:ring-primary flex items-center justify-center gap-2"
          >
            <span id="submit-label">등록하기</span>
          </button>
        </div>

      </form>
    </div>
  </main>

  <!-- ══════════════════════════════════════
       SCREEN 3 — DETAIL
  ══════════════════════════════════════ -->
  <main id="screen-detail" class="screen" aria-label="게시글 상세">
    <article class="max-w-3xl mx-auto px-5 pt-10 pb-24" id="detail-content">
      <!-- Filled by JS -->
    </article>
  </main>

  <!-- ══════════════════════════════════════
       SUPABASE CLIENT
  ══════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- ══════════════════════════════════════
       JAVASCRIPT
  ══════════════════════════════════════ -->
  <script>
    // ─── Supabase 초기화 ──────────────────────────────────────────────────────
    const SUPABASE_URL  = 'https://xcfglkomgoufwunalsqy.supabase.co';
    const SUPABASE_KEY  = 'sb_publishable_oNlNE6xYV_v2WbWOxqR5jg_Blq_TR86';
    const BUCKET        = 'post-images';
    const sb            = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ─── State ───────────────────────────────────────────────────────────────
    let posts           = [];
    let currentPostId   = null;
    let pendingImageFile = null;
    let isSubmitting    = false;

    // ─── Navigation ──────────────────────────────────────────────────────────
    function showScreen(name, postId) {
      document.querySelectorAll('.screen').forEach(s => {
        s.classList.remove('active');
        s.hidden = true;
      });

      const target = document.getElementById('screen-' + name);
      target.classList.add('active');
      target.hidden = false;
      target.removeAttribute('hidden');

      const backBtn  = document.getElementById('header-back-btn');
      const writeBtn = document.getElementById('header-write-btn');
      const spacer   = document.getElementById('header-spacer');

      if (name === 'list') {
        backBtn.classList.add('hidden');    backBtn.classList.remove('flex');
        writeBtn.classList.remove('hidden');
        spacer.classList.add('hidden');
        loadPosts();
      } else {
        backBtn.classList.remove('hidden'); backBtn.classList.add('flex');
        writeBtn.classList.add('hidden');
        spacer.classList.remove('hidden');
      }

      if (name === 'write') {
        resetWriteForm();
        if (window.matchMedia('(hover: hover) and (pointer: fine)').matches) {
          setTimeout(() => document.getElementById('input-title').focus(), 80);
        }
      }

      if (name === 'detail' && postId !== undefined) {
        currentPostId = postId;
        renderDetail(postId);
      }

      window.scrollTo({ top: 0, behavior: 'instant' });
    }

    function navigateBack() {
      const writeScreen = document.getElementById('screen-write');
      if (writeScreen.classList.contains('active')) {
        const titleVal = document.getElementById('input-title').value.trim();
        const bodyVal  = document.getElementById('input-body').value.trim();
        if (titleVal || bodyVal || pendingImageFile) {
          showConfirm();
          return;
        }
      }
      showScreen('list');
    }

    document.querySelectorAll('.screen').forEach(s => { s.hidden = true; });

    // ─── Confirm Dialog ───────────────────────────────────────────────────────
    function showConfirm() {
      const d = document.getElementById('confirm-dialog');
      d.classList.remove('hidden');
      document.getElementById('confirm-cancel-btn').focus();
    }
    function hideConfirm() {
      document.getElementById('confirm-dialog').classList.add('hidden');
    }
    document.getElementById('confirm-cancel-btn').addEventListener('click', hideConfirm);
    document.getElementById('confirm-ok-btn').addEventListener('click', () => { hideConfirm(); showScreen('list'); });
    document.getElementById('confirm-backdrop').addEventListener('click', hideConfirm);
    document.getElementById('confirm-dialog').addEventListener('keydown', e => {
      if (e.key === 'Escape') hideConfirm();
    });

    // ─── Toast ────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.remove('hidden-toast');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.add('hidden-toast'), 2800);
    }

    // ─── Supabase: 게시글 목록 불러오기 ──────────────────────────────────────
    async function loadPosts() {
      const container  = document.getElementById('post-list');
      const emptyState = document.getElementById('empty-state');

      container.innerHTML = buildSkeletons(3);
      emptyState.classList.add('hidden');
      emptyState.classList.remove('flex');

      const { data, error } = await sb
        .from('posts')
        .select('id, title, body, image_url, created_at')
        .order('created_at', { ascending: false })
        .limit(50);

      if (error) {
        container.innerHTML = '';
        showToast('⚠ 게시글을 불러오지 못했어요: ' + error.message);
        return;
      }

      posts = data || [];
      renderList();
    }

    // ─── Render List ──────────────────────────────────────────────────────────
    function renderList() {
      const container  = document.getElementById('post-list');
      const emptyState = document.getElementById('empty-state');

      if (posts.length === 0) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
        emptyState.classList.add('flex');
        return;
      }

      emptyState.classList.add('hidden');
      emptyState.classList.remove('flex');
      container.innerHTML = posts.map(post => buildCard(post)).join('');
    }

    function buildSkeletons(n) {
      return Array.from({ length: n }, () => `
        <div class="bg-surface-container-lowest rounded-xl overflow-hidden animate-pulse">
          <div class="aspect-[16/10] bg-surface-container-high"></div>
          <div class="p-6 space-y-3">
            <div class="h-3 bg-surface-container-high rounded w-1/4"></div>
            <div class="h-5 bg-surface-container-high rounded w-3/4"></div>
            <div class="h-3 bg-surface-container-high rounded w-full"></div>
            <div class="h-3 bg-surface-container-high rounded w-2/3"></div>
          </div>
        </div>`).join('');
    }

    function buildCard(post) {
      const dateStr    = formatDate(post.created_at);
      const excerpt    = post.body.length > 120 ? post.body.slice(0, 120) + '…' : post.body;
      const titleEsc   = escapeHtml(post.title);
      const excerptEsc = escapeHtml(excerpt);
      const idStr      = JSON.stringify(post.id);

      if (post.image_url) {
        return `
          <article
            class="post-card bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden flex flex-col cursor-pointer"
            tabindex="0"
            role="button"
            aria-label="${titleEsc} 게시글 보기"
            onclick="openDetail(${idStr})"
            onkeydown="if(event.key==='Enter'||event.key===' ')openDetail(${idStr})"
          >
            <div class="aspect-[16/10] img-zoom">
              <img
                src="${escapeHtml(post.image_url)}"
                alt="${titleEsc} 썸네일"
                class="w-full h-full object-cover"
                width="320" height="200"
                loading="lazy"
              />
            </div>
            <div class="p-6 flex flex-col flex-1">
              <time class="text-xs text-on-surface-variant/70 tabular-nums mb-2 font-label" datetime="${post.created_at}">${dateStr}</time>
              <h2 class="font-headline font-bold text-xl text-on-surface mb-2 min-w-0 break-words">${titleEsc}</h2>
              <p class="text-on-surface-variant text-sm leading-relaxed line-clamp-3 min-w-0 break-words flex-1">${excerptEsc}</p>
            </div>
          </article>`;
      } else {
        return `
          <article
            class="post-card bg-surface-container rounded-xl p-8 flex flex-col cursor-pointer min-h-[220px]"
            tabindex="0"
            role="button"
            aria-label="${titleEsc} 게시글 보기"
            onclick="openDetail(${idStr})"
            onkeydown="if(event.key==='Enter'||event.key===' ')openDetail(${idStr})"
          >
            <time class="text-xs text-on-surface-variant/70 tabular-nums mb-3 font-label" datetime="${post.created_at}">${dateStr}</time>
            <h2 class="font-headline font-bold text-2xl text-on-surface mb-4 min-w-0 break-words">${titleEsc}</h2>
            <p class="text-on-surface-variant leading-relaxed line-clamp-3 min-w-0 break-words flex-1">${excerptEsc}</p>
          </article>`;
      }
    }

    // ─── Supabase: 게시글 상세 불러오기 ──────────────────────────────────────
    async function openDetail(postId) {
      currentPostId = postId;
      showScreen('detail');

      const detailEl = document.getElementById('detail-content');
      detailEl.innerHTML = `<div class="space-y-6 animate-pulse">
        <div class="h-3 bg-surface-container-high rounded w-1/5"></div>
        <div class="h-10 bg-surface-container-high rounded w-4/5"></div>
        <div class="aspect-[16/9] bg-surface-container-high rounded-xl"></div>
        <div class="space-y-3">
          <div class="h-4 bg-surface-container-high rounded w-full"></div>
          <div class="h-4 bg-surface-container-high rounded w-5/6"></div>
          <div class="h-4 bg-surface-container-high rounded w-3/4"></div>
        </div>
      </div>`;

      let post = posts.find(p => p.id === postId);

      if (!post) {
        const { data, error } = await sb
          .from('posts')
          .select('*')
          .eq('id', postId)
          .single();

        if (error || !data) {
          showToast('게시글을 불러오지 못했어요.');
          showScreen('list');
          return;
        }
        post = data;
      } else if (!post.body || post.body.length <= 150) {
        const { data } = await sb
          .from('posts')
          .select('*')
          .eq('id', postId)
          .single();
        if (data) post = data;
      }

      renderDetailContent(post);
    }

    function renderDetail(postId) {
      openDetail(postId);
    }

    function renderDetailContent(post) {
      const dateStr  = formatDate(post.created_at);
      const titleEsc = escapeHtml(post.title);
      const bodyHtml = escapeHtml(post.body)
        .replace(/\n{2,}/g, '</p><p class="mb-5 leading-loose text-lg text-on-surface/90 min-w-0 break-words">')
        .replace(/\n/g, '<br/>');

      const imageSection = post.image_url ? `
        <section class="mb-10" aria-label="첨부 이미지">
          <img
            src="${escapeHtml(post.image_url)}"
            alt="${titleEsc} 첨부 이미지"
            class="detail-image"
            width="720" height="480"
            fetchpriority="high"
          />
        </section>` : '';

      document.getElementById('detail-content').innerHTML = `
        <header class="mb-8">
          <time class="text-xs text-on-surface-variant/70 tabular-nums block mb-4 font-label" datetime="${post.created_at}">${dateStr}</time>
          <h1 class="font-headline font-extrabold text-3xl md:text-4xl lg:text-5xl tracking-tight text-on-surface leading-tight mb-6 min-w-0 break-words">
            ${titleEsc}
          </h1>
          <div class="h-px bg-outline-variant/20"></div>
        </header>

        ${imageSection}

        <section class="mb-12" aria-label="본문">
          <p class="mb-5 leading-loose text-lg text-on-surface/90 min-w-0 break-words">${bodyHtml}</p>
        </section>

        <div class="pt-6 border-t border-outline-variant/15">
          <button
            class="btn-primary inline-flex items-center gap-2 px-7 py-3.5 rounded-full font-bold text-sm focus-visible:ring-2 focus-visible:ring-primary"
            onclick="showScreen('list')"
            onkeydown="if(event.key==='Enter'||event.key===' ')showScreen('list')"
          >
            <span class="material-symbols-outlined text-base" aria-hidden="true">arrow_back</span>
            목록으로 돌아가기
          </button>
        </div>
      `;
    }

    // ─── Write Form ───────────────────────────────────────────────────────────
    function resetWriteForm() {
      document.getElementById('write-form').reset();
      pendingImageFile = null;
      document.getElementById('img-preview-wrapper').classList.add('hidden');
      document.getElementById('upload-placeholder').classList.remove('hidden');
      document.getElementById('remove-img-btn').classList.add('hidden');
      document.getElementById('img-preview').src = '';
      hideFieldError('title');
      hideFieldError('body');
      isSubmitting = false;
      setSubmitIdle();
    }

    async function submitPost(event) {
      event.preventDefault();
      if (isSubmitting) return;

      const titleEl = document.getElementById('input-title');
      const bodyEl  = document.getElementById('input-body');
      let valid = true;

      hideFieldError('title');
      hideFieldError('body');

      if (!titleEl.value.trim()) { showFieldError('title'); valid = false; }
      if (!bodyEl.value.trim())  { showFieldError('body');  valid = false; }

      if (!valid) {
        if (!titleEl.value.trim()) titleEl.focus();
        else bodyEl.focus();
        return;
      }

      isSubmitting = true;
      setSubmitLoading();

      try {
        let image_url  = null;
        let image_path = null;

        // 1. 이미지 업로드 (있을 때만)
        if (pendingImageFile) {
          const ext      = pendingImageFile.name.split('.').pop();
          const filePath = `posts/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

          const { data: uploadData, error: uploadErr } = await sb.storage
            .from(BUCKET)
            .upload(filePath, pendingImageFile, { cacheControl: '3600', upsert: false });

          if (uploadErr) throw new Error('이미지 업로드 실패: ' + uploadErr.message);

          image_path = uploadData.path;
          image_url  = sb.storage.from(BUCKET).getPublicUrl(image_path).data.publicUrl;
        }

        // 2. DB 저장
        const { data: post, error: insertErr } = await sb
          .from('posts')
          .insert({ title: titleEl.value.trim(), body: bodyEl.value.trim(), image_path, image_url })
          .select()
          .single();

        if (insertErr) throw new Error('저장 실패: ' + insertErr.message);

        posts.unshift(post);
        setSubmitIdle();
        isSubmitting = false;
        showScreen('list');
        showToast('✓ 게시글이 등록되었습니다');

      } catch (err) {
        setSubmitIdle();
        isSubmitting = false;
        showToast('⚠ ' + err.message);
      }
    }

    function setSubmitLoading() {
      const btn   = document.getElementById('submit-btn');
      const label = document.getElementById('submit-label');
      btn.disabled = true;
      label.innerHTML = '<span class="spinner mr-2"></span>등록 중…';
    }
    function setSubmitIdle() {
      const btn   = document.getElementById('submit-btn');
      const label = document.getElementById('submit-label');
      btn.disabled = false;
      label.textContent = '등록하기';
    }

    function showFieldError(field) {
      document.getElementById(field + '-error').classList.remove('hidden');
    }
    function hideFieldError(field) {
      document.getElementById(field + '-error').classList.add('hidden');
    }

    function confirmCancel() {
      const titleVal = document.getElementById('input-title').value.trim();
      const bodyVal  = document.getElementById('input-body').value.trim();
      if (titleVal || bodyVal || pendingImageFile) {
        showConfirm();
      } else {
        showScreen('list');
      }
    }

    // ─── Image Handling ───────────────────────────────────────────────────────
    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (file) applyImage(file);
    }

    function applyImage(file) {
      if (!file.type.startsWith('image/')) {
        showToast('이미지 파일만 첨부할 수 있어요.');
        return;
      }
      if (file.size > 10 * 1024 * 1024) {
        showToast('10MB 이하의 이미지만 첨부할 수 있어요.');
        return;
      }
      pendingImageFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('img-preview').src = e.target.result;
        document.getElementById('img-preview-wrapper').classList.remove('hidden');
        document.getElementById('upload-placeholder').classList.add('hidden');
        document.getElementById('remove-img-btn').classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    }

    function removeImage() {
      pendingImageFile = null;
      document.getElementById('img-preview').src = '';
      document.getElementById('img-preview-wrapper').classList.add('hidden');
      document.getElementById('upload-placeholder').classList.remove('hidden');
      document.getElementById('remove-img-btn').classList.add('hidden');
      document.getElementById('input-image').value = '';
    }

    function handleDragOver(e) {
      e.preventDefault();
      document.getElementById('upload-zone').classList.add('drag-over');
    }
    function handleDragLeave(e) {
      document.getElementById('upload-zone').classList.remove('drag-over');
    }
    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('upload-zone').classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) applyImage(file);
    }

    // ─── Auto-resize textarea ─────────────────────────────────────────────────
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function formatDate(ts) {
      return new Intl.DateTimeFormat('ko-KR', {
        year: 'numeric', month: 'long', day: 'numeric'
      }).format(new Date(ts));
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // ─── Warn on unsaved changes ──────────────────────────────────────────────
    window.addEventListener('beforeunload', e => {
      const writeScreen = document.getElementById('screen-write');
      if (!writeScreen.classList.contains('active')) return;
      const titleVal = document.getElementById('input-title').value.trim();
      const bodyVal  = document.getElementById('input-body').value.trim();
      if (titleVal || bodyVal || pendingImageFile) {
        e.preventDefault();
        e.returnValue = '';
      }
    });

    // ─── Init ─────────────────────────────────────────────────────────────────
    showScreen('list');
  </script>

</body>
</html>
